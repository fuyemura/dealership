name: Database Tests

on:
  pull_request:
    paths:
      - 'sql/**'
      - 'supabase/**'

jobs:
  test-database:
    name: pgTAP — Schema, PKs, FKs, Constraints
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Enable pgTAP
        run: supabase db query "CREATE EXTENSION IF NOT EXISTS pgtap;"

      - name: Apply database schema
        env:
          DB_URL: postgresql://postgres:postgres@localhost:54322/postgres
        run: |
          supabase db query "CREATE SCHEMA IF NOT EXISTS dealership;"
          psql "$DB_URL" -f sql/01_create-tables.sql
          psql "$DB_URL" -f sql/02_grant-dealership.sql
          psql "$DB_URL" -f sql/03_rls_tables.sql
          psql "$DB_URL" -f sql/04_functions.sql

      - name: Run database tests
        run: supabase test db
